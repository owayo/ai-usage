# ai-usage 設定例 — ~/.config/ai-usage/config.toml へコピーしてください
# (または $XDG_CONFIG_HOME/ai-usage/config.toml)
#
# 任意設定です。config file がない場合、ai-usage は Claude / Codex / PixelLab session を
# 持つ Chrome profile をすべて auto-discover して表示します(default behavior)。
#
# 優先順: CLI flags (--profile / --only / --active-email) > この file > auto-detection。
#
# Tip: `ai-usage --init-config` で現在 signed-in 済み profile から生成し、
# 必要に応じて編集できます。

# この account を "active" として highlight します(statusline の Claude 行が red+bold)。
# default は CLAUDE_CONFIG_DIR/.claude.json からの auto-detect
# (この Claude Code session の account)なので、通常は設定不要です。
# active_email = "work@example.com"

# 表示する profile をこの順序で選びます。[[profiles]] を 1 つでも書くと、
# listed profile だけが表示されます。Chrome 表示名または on-disk dir で match します。
[[profiles]]
match = "Work"                    # Chrome profile 表示名、または dir 例: "Default"
label = "work"                    # optional: account email username の代わりに表示
# providers = ["claude", "codex", "pixellab"] # optional: 表示 subset。default = 全 provider

[[profiles]]
match = "Home"
label = "home"

# Antigravity(Google `agy`)使用量。~/.gemini OAuth token または実行中 `agy` があれば
# auto-discover されるため config は不要です。label 変更、非 default token 指定、
# または off にしたい場合だけ追加します。
[antigravity]
# enabled = true          # false なら Antigravity が存在しても非表示
label = "antigravity"     # optional: 行に表示する label
# token_path = "~/.gemini/antigravity-cli/antigravity-oauth-token"  # non-default token
